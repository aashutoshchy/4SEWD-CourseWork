<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>User Registration</h1>
    <form action="">
        <fieldset>
            <legend>Personal Details</legend>
            <label for="firstName">First Name: </label>
            <input type="text" id="firstName">
            <br>
            <label for="lastName">Last Name: </label>
            <input type="text" id="lastName">
            <br>
            <label for="age">Age: </label>
            <input type="number" id="age" min="1">
            <br>
            <label for="gender">Gender: </label>
            <select name="" id="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <br>
            <label for="profilePicture">Profile Picture: </label>
            <input type="file">
        </fieldset>

        <fieldset>
            <legend>Account Details</legend>
            <label for="emailInput">Email: </label>
            <input type="email">
            <br>
            <label for="passwordInput">Password: </label>
            <input type="password">
            <br>
            <label for="role">Role: </label>
            <input type="radio" value="Admin" id="admin" name="role">
            <label for="admin">Admin</label>
            <input type="radio" value="User" id="user" name="role">
            <label for="user">User</label>
        </fieldset>
        <input type="checkbox">
        <label for="">I agree to terms and conditions.</label>
        <button>Register</button>
        <button>Reset</button>

        <p>&copy; My todo list. All right reserved.</p>
    </form>
</body>
</html>
